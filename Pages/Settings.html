<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings | WMC Treasury</title>
  <link rel="icon" type="image/png" href="../Assets/logo.png"/>
  <link rel="stylesheet" href="../Styles/Settings.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/otpauth@9.3.6/dist/otpauth.umd.min.js"></script>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('wmc_user')) location.replace('../index.html');
    window.addEventListener('storage', (e) => {
      if (e.key === 'wmc_logout') { sessionStorage.removeItem('wmc_user'); location.replace('../index.html'); }
    });
  </script>

  <!-- Decorative blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <header class="settings-header">
    <div class="logo-area">
      <img src="../Assets/logo.png" alt="Logo" class="logo-img"/>
      <div class="org-name">
        <strong>Southwestern Philippines</strong> Union Conference
      </div>
    </div>
    <h1 class="settings-title">SETTINGS</h1>
  </header>

  <main class="settings-main">

    <!-- Left Profile Card -->
    <div class="profile-card">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatar">?</div>
      </div>
      <p class="profile-name" id="profileName">—</p>
      <p class="profile-username" id="profileUsername">—</p>

      <div class="profile-stats">
        <div class="stat-row"><span>Mission</span><span>WMC</span></div>
        <div class="stat-row"><span>Role</span><span>Treasurer</span></div>
        <div class="stat-row"><span>Status</span><span>Active</span></div>
      </div>
    </div>

    <!-- Right Settings Panel -->
    <div class="settings-panel">
      <div class="panel-header">
        <h3>Account Settings</h3>
        <p>Update your personal information and password</p>
      </div>

      <div class="panel-body">
        <div class="form-grid">
          <div class="form-row">
            <label>Username</label>
            <input type="text" id="fUsername" placeholder="username"/>
          </div>
          <div class="form-row">
            <label>Full Name</label>
            <input type="text" id="fFullName" placeholder="Full Name"/>
          </div>
          <div class="form-row">
            <label>Email Address</label>
            <input type="email" id="fEmail" placeholder="email@example.com"/>
          </div>
          <div class="form-row">
            <label>Phone Number</label>
            <input type="text" id="fPhone" placeholder="+63…"/>
          </div>
          <div class="form-divider"></div>
          <div class="form-row form-row-full">
            <label>New Password <span class="pw-hint">(leave blank to keep current)</span></label>
            <input type="password" id="fPassword" placeholder="Enter new password"/>
          </div>
          <div class="form-divider"></div>
          <div class="form-row form-row-full">
            <label>Two-Factor Authentication</label>
            <div class="twofa-status">
              <div class="twofa-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Disabled</span>
              </div>
              <div class="twofa-actions" id="twoFaActions"></div>
            </div>
          </div>
        </div>

        <div class="save-feedback hidden" id="saveFeedback"></div>

        <div class="profile-actions">
          <button class="btn-save-profile" id="btnSave" onclick="saveProfile()">Save Changes</button>
          <button class="btn-logout" onclick="logout()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="bottom-nav-btn" onclick="location.href='Dashboard.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>
      <span>Home</span>
    </button>
    <button class="bottom-nav-btn" onclick="location.href='Churches.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Churches</span>
    </button>
    <button class="bottom-nav-btn" onclick="window.open('https://map-missions.netlify.app','_blank')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      <span>Maps</span>
    </button>
    <button class="bottom-nav-btn active"><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <!-- 2FA Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <h3 id="modalTitle">Enable Two-Factor Authentication</h3>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="../Script/Settings.js"></script>
</body>
</html>
